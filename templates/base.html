<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}{{ config.title }}{% endblock %}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Uncial+Antiqua&display=swap"
            rel="stylesheet"
        />
        <link rel="icon" href="{{ get_url(path='favicon.ico') }}" sizes="any" />

        <link rel="manifest" href="{{ get_url(path='manifest.json') }}" />
        <link rel="stylesheet" href="{{ get_url(path='main.css') }}" />
    </head>

                        baseFrequency="0.06"
                        numOctaves="4"
                        seed="3"
                        result="noise"
                    />
                    <feDisplacementMap
                        in="SourceGraphic"
                        in2="noise"
                        scale="18"
                        xChannelSelector="R"
                        yChannelSelector="G"
                    />

        {% block header %}
        <header class="site-header">
            <div class="container">
                <a href="{{ config.base_url }}" class="site-title"
                    >{{ config.title }}</a
                >
            </div>
        </header>
        {% endblock %}

        <main>{% block content %}{% endblock %}</main>

        <footer class="site-footer">
            <div class="container">
                <div class="site-footer-links">
                    <ul>
                        <li>
                            <a href="{{ get_url(path='@/credits.md') }}"
                                >Credits</a
                            >
                        </li>
                        <li>
                            <a
                                href="https://www.getzola.org/"
                                target="_blank"
                                rel="noopener"
                                >Built with Zola</a
                            >
                        </li>
                        <li><a href="#">View on GitHub</a></li>
                    </ul>
                </div>
                <p class="site-footer-disclaimer">
                    Root is designed by Cole Wehrle and published by
                    <a
                        href="https://ledergames.com"
                        target="_blank"
                        rel="noopener"
                        >Leder Games</a
                    >.
                </p>
            </div>
        </footer>
        <script>
            document.querySelectorAll('a[href^="http"]').forEach(function(a) {
                if (a.hostname !== window.location.hostname) {
                    a.setAttribute('target', '_blank');
                    a.setAttribute('rel', 'noopener');
                }
            });
        </script>
    </body>
</html>
